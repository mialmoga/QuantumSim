<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" style="background:#060d1a" data-symbol="He" data-shells="2">
<defs>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="1.8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="nglow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<g id="shell-0" class="bohr-shell" data-shell="0" data-n="1" data-l="s" data-label="1s" data-count="2">
  <circle cx="160" cy="160" r="108.0" fill="none" stroke="rgb(0,255,255)" stroke-width="0.6" opacity="0.25" class="orbit-ring"/>
  <circle cx="160.00" cy="52.00" r="4.5" fill="rgb(0,255,255)" filter="url(#glow)" opacity="0.85" class="electron"/>
  <circle cx="160.00" cy="268.00" r="4.5" fill="rgb(0,255,255)" filter="url(#glow)" opacity="0.85" class="electron"/>
</g>
<g id="nucleus" class="bohr-nucleus">
  <circle cx="160" cy="160" r="18" fill="#ffc0cb" filter="url(#nglow)" opacity="0.9"/>
  <circle cx="160" cy="160" r="9.0" fill="white" opacity="0.2"/>
  <text x="160" y="164.6" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fff" opacity="0.95">He</text>
</g>
<text x="160" y="137.0" text-anchor="middle" font-family="monospace" font-size="8" fill="#334" opacity="0.6">2</text>
<text x="160" y="314" text-anchor="middle" font-family="monospace" font-size="7" fill="#334" opacity="0.45">2</text>
</svg>