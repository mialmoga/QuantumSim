<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QCS - H2O Volumétrico</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050a0f; }
        canvas { display: block; }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/",
            "three/webgpu":   "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
            "three/tsl":      "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.tsl.js"
        }
    }
    </script>
    <!--<script type="importmap">
    {
      "imports": {
        "three":          "/lib/three/build/three.module.js",
        "three/addons/":  "/lib/three/examples/jsm/",
        "three/webgpu":   "/lib/three/build/three.webgpu.js",
        "three/tsl":      "/lib/three/build/three.tsl.js"
      }
    }
    </script>-->
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        
        // --- Lógica de generación ---
        const targetParticles = 50000; // Ajustado para arranque seguro
        const positions = new Float32Array(targetParticles * 3);
        const colors = new Float32Array(targetParticles * 3);
        const sizes = new Float32Array(targetParticles);

        for(let i = 0; i < targetParticles; i++) {
            positions[i*3] = (Math.random() - 0.5) * 4;
            positions[i*3+1] = (Math.random() - 0.5) * 4;
            positions[i*3+2] = (Math.random() - 0.5) * 4;
            colors[i*3] = 0.7; colors[i*3+1] = 0.8; colors[i*3+2] = 1.0;
            sizes[i] = Math.random() * 2;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.ShaderMaterial({
            glslVersion: THREE.GLSL3,
            vertexShader: `
                precision highp float;
                in float size;
                in vec3 color;
                out vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (200.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                precision highp float;
                in vec3 vColor;
                out vec4 fragColor;
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    fragColor = vec4(vColor, 1.0 - (dist * 2.0));
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const points = new THREE.Points(geometry, material);
        points.frustumCulled = false; 
        scene.add(points);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85));

        function animate() {
            requestAnimationFrame(animate);
            composer.render();
        }
        animate();
    </script>
</body>
</html>
